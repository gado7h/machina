name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  export-and-upload-artifact:
    runs-on: ubuntu-latest
    env:
      MACHINA_VERSION: ${{ github.ref_name }}
      MACHINA_ARTIFACT_DIR: ${{ runner.temp }}/machina-bundles

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2
        with:
          cache: true

      - name: Install toolchain
        run: rokit install --no-trust-check

      - name: Verify toolchain
        run: |
          rokit --version
          selene --version
          stylua --version

      - name: Lint with Selene
        run: selene src

      - name: Check formatting with StyLua
        run: stylua --check src

      - name: Generate package bundles
        run: pwsh -File tools/build-targets.ps1 -Target all -Version "${{ env.MACHINA_VERSION }}" -GitRef "${{ github.sha }}"

      - name: Archive package bundles
        run: |
          mkdir -p "$MACHINA_ARTIFACT_DIR"
          tar -czf "$MACHINA_ARTIFACT_DIR/machina-luau-${MACHINA_VERSION}.tar.gz" -C dist machina-luau
          tar -czf "$MACHINA_ARTIFACT_DIR/machina-roblox-${MACHINA_VERSION}.tar.gz" -C dist machina-roblox

      - name: Write artifact metadata
        run: pwsh -File tools/write-release-metadata.ps1 -Version "${{ env.MACHINA_VERSION }}" -GitRef "${{ github.sha }}" -LuauArchive "${{ env.MACHINA_ARTIFACT_DIR }}/machina-luau-${{ env.MACHINA_VERSION }}.tar.gz" -RobloxArchive "${{ env.MACHINA_ARTIFACT_DIR }}/machina-roblox-${{ env.MACHINA_VERSION }}.tar.gz" -OutputDirectory "${{ env.MACHINA_ARTIFACT_DIR }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: machina-bundles-${{ env.MACHINA_VERSION }}
          path: ${{ env.MACHINA_ARTIFACT_DIR }}
